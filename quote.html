<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request a Quote | Kezekiel Designs</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f7ead7 0%, #f3d2a2 45%, #9f4b1f 100%);
      color: #2a1608;
      line-height: 1.6;
    }

    header {
      background: linear-gradient(180deg, rgba(53, 25, 8, 0.92), rgba(120, 49, 13, 0.88));
      color: white;
      text-align: center;
      padding: 20px;
      border-bottom: 5px solid #f29a1f;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 6px;
    }

    .logo-wrap img {
      width: 260px;
      max-width: 80vw;
      height: auto;
      display: block;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.45);
    }

    nav {
      background-color: #2f1405;
      text-align: center;
      padding: 14px 12px;
      border-bottom: 3px solid #f29a1f;
    }

    nav a {
      color: #fff4df;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    section {
      max-width: 1050px;
      margin: 28px auto;
      padding: 34px 22px;
      background: rgba(255, 246, 232, 0.95);
      border-radius: 18px;
      box-shadow: 0 8px 20px rgba(56, 20, 0, 0.14);
      border: 2px solid rgba(163, 72, 18, 0.18);
    }

    h1, h2 {
      margin-top: 0;
      color: #7b2f0f;
    }

    form {
      margin-top: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .checkbox-group {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fffdf9;
      border: 1px solid #cfa77d;
      border-radius: 8px;
      padding: 10px 12px;
    }

    .quantity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .quantity-box,
    .size-box {
      background: #fffdf9;
      border: 1px solid #cfa77d;
      border-radius: 10px;
      padding: 12px;
    }

    .quantity-box label,
    .size-box label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .sizes-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .size-check-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 8px;
    }

    .size-check-grid label {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff7eb;
      border: 1px solid #cfa77d;
      border-radius: 8px;
      padding: 8px 10px;
      font-weight: normal;
    }

    input[type="text"],
    input[type="email"],
    input[type="number"],
    input[type="file"],
    textarea {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border: 1px solid #cfa77d;
      border-radius: 8px;
      font: inherit;
      background: #fffdf9;
    }

    textarea {
      resize: vertical;
    }

    .button {
      display: inline-block;
      background: linear-gradient(180deg, #f29a1f 0%, #cb5c17 100%);
      color: white;
      padding: 12px 22px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      margin-top: 12px;
      border: none;
      cursor: pointer;
      box-shadow: 0 6px 12px rgba(95, 34, 5, 0.18);
    }

    footer {
      background-color: #2f1405;
      color: #fff4df;
      text-align: center;
      padding: 24px 20px;
      margin-top: 40px;
      border-top: 4px solid #f29a1f;
    }

    @media (max-width: 700px) {
      .sizes-grid {
        grid-template-columns: 1fr;
      }

      .size-check-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      section {
        margin: 18px 12px;
        padding: 26px 18px;
      }

      nav a {
        display: inline-block;
        margin: 8px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-wrap">
      <img src="logo.png" alt="Kezekiel Designs logo" />
    </div>
    <p>Request a custom quote for shirts, hats, or both.</p>
  </header>

  <nav>
    <a href="index.html">Home</a>
    <a href="index.html#services">Services</a>
    <a href="index.html#gallery">Gallery</a>
    <a href="quote.html">Quote</a>
  </nav>

  <section>
    <h1>Request a Quote</h1>
    <p>Mix and match products in one request and we’ll get back to you.</p>

    <form action="https://formspree.io/f/mbdpdlqd" method="POST" enctype="multipart/form-data">
      <div class="form-grid">
        <div>
          <label for="name"><strong>Name</strong></label>
          <input type="text" id="name" name="name" required />
        </div>

        <div>
          <label for="business"><strong>Business Name</strong></label>
          <input type="text" id="business" name="business_name" />
        </div>

        <div>
          <label for="email"><strong>Email</strong></label>
          <input type="email" id="email" name="email" required />
        </div>

        <div>
          <label for="phone"><strong>Phone</strong></label>
          <input type="text" id="phone" name="phone" />
        </div>
      </div>

      <div style="margin-top: 16px;">
        <label><strong>Select Products</strong></label>
        <div class="checkbox-group">
          <label>
            <input type="checkbox" name="product_type[]" value="Performance Work Shirts" id="product-performance" />
            Performance Work Shirts
          </label>

          <label>
            <input type="checkbox" name="product_type[]" value="Standard Cotton Shirts" id="product-standard" />
            Standard Cotton Shirts
          </label>

          <label>
            <input type="checkbox" name="product_type[]" value="DTF Hats" id="product-dtf" />
            DTF Hats (No Minimum)
          </label>

          <label>
            <input type="checkbox" name="product_type[]" value="Patch Hats" id="product-patch" />
            Patch Hats (10 Minimum)
          </label>
        </div>
      </div>

      <div class="quantity-grid">
        <div class="quantity-box">
          <label for="qty-performance">Performance Work Shirts Quantity</label>
          <input type="number" id="qty-performance" name="performance_work_shirts_quantity" min="0" />
        </div>

        <div class="quantity-box">
          <label for="qty-standard">Standard Cotton Shirts Quantity</label>
          <input type="number" id="qty-standard" name="standard_cotton_shirts_quantity" min="0" />
        </div>

        <div class="quantity-box">
          <label for="qty-dtf">DTF Hats Quantity</label>
          <input type="number" id="qty-dtf" name="dtf_hats_quantity" min="0" />
        </div>

        <div class="quantity-box">
          <label for="qty-patch">Patch Hats Quantity</label>
          <input type="number" id="qty-patch" name="patch_hats_quantity" min="0" />
        </div>
      </div>

      <div class="sizes-grid">
        <div class="size-box">
          <label><strong>Performance Work Shirt Sizes</strong></label>
          <div class="size-check-grid">
            <label><input type="checkbox" name="performance_sizes[]" value="S" /> S</label>
            <label><input type="checkbox" name="performance_sizes[]" value="M" /> M</label>
            <label><input type="checkbox" name="performance_sizes[]" value="L" /> L</label>
            <label><input type="checkbox" name="performance_sizes[]" value="XL" /> XL</label>
            <label><input type="checkbox" name="performance_sizes[]" value="2XL" /> 2XL</label>
            <label><input type="checkbox" name="performance_sizes[]" value="3XL" /> 3XL</label>
          </div>
        </div>

        <div class="size-box">
          <label><strong>Standard Cotton Shirt Sizes</strong></label>
          <div class="size-check-grid">
            <label><input type="checkbox" name="standard_sizes[]" value="S" /> S</label>
            <label><input type="checkbox" name="standard_sizes[]" value="M" /> M</label>
            <label><input type="checkbox" name="standard_sizes[]" value="L" /> L</label>
            <label><input type="checkbox" name="standard_sizes[]" value="XL" /> XL</label>
            <label><input type="checkbox" name="standard_sizes[]" value="2XL" /> 2XL</label>
            <label><input type="checkbox" name="standard_sizes[]" value="3XL" /> 3XL</label>
          </div>
        </div>
      </div>

      <div style="margin-top: 16px;">
        <label for="logo"><strong>Upload Your Logo (optional)</strong></label>
        <input type="file" id="logo" name="attachment" accept=".png,.jpg,.jpeg,.pdf,.svg" />
      </div>

      <div style="margin-top: 16px;">
        <label for="details"><strong>Project Details</strong></label>
        <textarea id="details" name="details" rows="6" placeholder="Tell us logo details, colors, placement, and anything else you want us to know."></textarea>
      </div>

      <input type="hidden" name="_subject" value="New Quote Request - Kezekiel Designs" />

      <button class="button" type="submit">Send Quote Request</button>
    </form>

    <div style="margin-top: 20px;">
      <p><strong>Email:</strong> KezekielDesigns@gmail.com</p>
      <p><strong>Phone:</strong> (480)435-2715</p>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 Kezekiel Designs. All rights reserved.</p>
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const product = params.get("product");

    if (product === "performance") {
      document.getElementById("product-performance").checked = true;
      document.getElementById("qty-performance").value = 1;
    }

    if (product === "standard") {
      document.getElementById("product-standard").checked = true;
      document.getElementById("qty-standard").value = 1;
    }

    if (product === "dtf") {
      document.getElementById("product-dtf").checked = true;
      document.getElementById("qty-dtf").value = 1;
    }

    if (product === "patch") {
      document.getElementById("product-patch").checked = true;
      document.getElementById("qty-patch").value = 1;
    }
  </script>
</body>
</html>
